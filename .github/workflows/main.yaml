name: java-access-bridge-wrapper

on:
  push:
    paths:
      - src/**
      - .github/workflows/**

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run lint
        run: uv run inv lint
